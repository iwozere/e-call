# P2P-only stack for Raspberry Pi (Ubuntu) + Cloudflare Tunnel.
# Run from this directory: docker compose -f docker-compose.p2p.yml up -d
#
# Prerequisites: ./html populated (see docs/deploy-pi-p2p.md), .env from .env.example

services:
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      LISTEN_HOST: "0.0.0.0"
      TRUST_PROXY: "true"
    expose:
      - "3001"
    networks: [ecall]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    # server_name comes from APP_BASE_URL (or optional CALL_HOST); see nginx/README.md
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/docker-entrypoint.d/05-compute-call-host.sh:/docker-entrypoint.d/05-compute-call-host.sh:ro
      - ./html:/usr/share/nginx/html:ro
    networks: [ecall]

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run
    env_file: .env
    networks: [ecall]

networks:
  ecall:
    driver: bridge

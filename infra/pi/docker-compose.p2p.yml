# P2P-only stack for Raspberry Pi (Ubuntu) + nginx + backend.
# Run from this directory: docker compose -f docker-compose.p2p.yml up -d
#
# Optional: run the bundled cloudflared sidecar only if you are NOT using a tunnel elsewhere:
#   docker compose -f docker-compose.p2p.yml --profile tunnel up -d
# (requires TUNNEL_TOKEN in .env)
#
# Prerequisites: ./html populated (see docs/deploy-pi-p2p.md), .env from .env.example

services:
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      LISTEN_HOST: "0.0.0.0"
      TRUST_PROXY: "true"
    expose:
      - "3001"
    networks: [ecall]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: ecall-nginx:local
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    container_name: ecall-nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./html:/usr/share/nginx/html:ro
    networks: [ecall]

  cloudflared:
    profiles:
      - tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run
    env_file: .env
    networks: [ecall]

networks:
  ecall:
    driver: bridge
